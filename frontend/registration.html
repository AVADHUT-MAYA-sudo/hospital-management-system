<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="firstpage">
        <div>
            <img src="images/Picture1.png" alt="picture1">
        </div>

        <div class="container">
            <h1>Registration form </h1>
            <p>Please fill the below details</p>

            <form id="patientForm" class="patientForm">
                <span class="register-row">
                <label for="name" class="iconinside">
                    <img src="images/person.png" alt="person">
                    <input type="text" placeholder="Name" id="name" required>
                </label>
                <label for="phone" class="iconinside">
                    <img src="images/phone.png" alt="phone">
                    <input type="text" placeholder="Phone" id="phone" required>
                </label>
                </span>
                <span class="register-row">
                <label for="clinic" class="iconinside">
                    <img src="images/home.png" alt="home">
                    <input type="text" placeholder="Clinic Name" id="clinic">
                </label>
                <label for="city" class="iconinside">
                    <img src="images/buildings.png" alt="buildings">
                    <input type="text" placeholder="City" id="city">
                </label>
                </span>
                <label for="area" class="iconinside">
                    <img src="images/buildings.png" alt="buildings">
                    <input type="text" placeholder="Area" id="area">
                </label>


                <button type="submit" ><b>NEXT</b></button>
            </form>

            <!-- <h3>Patients List</h3>
            <ul id="patientList"></ul> -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
